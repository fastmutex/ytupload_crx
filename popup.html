<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 220px;
      padding: 16px;
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 15px;
      color: #0f0f0f;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #065fd4;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover {
      background: #0550b5;
    }
    p {
      margin: 10px 0 0;
      font-size: 11px;
      color: #909090;
    }
  </style>
</head>
<body>
  <h3>YT Upload</h3>
  <button id="btn">Open Upload Form</button>
  <p>Opens in a new tab on YouTube</p>
  <script src="popup.js"></script>
</body>
</html>
